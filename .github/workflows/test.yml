name: Tests
on:
  push:
    paths:
      - '**/*.py'
      - '**/requirements*.txt'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/requirements*.txt'
      - '.github/workflows/*.yml'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest sentinelle/tests/ -v
